name: Release

# package.ps1 cross-builds and packages BOTH the Windows amd64 zip and the
# macOS arm64 .app, plus a single SHA256SUMS.txt covering both.
#
# Packaging runs on an explicit tag push or a manual dispatch. Publishing is
# tag-only and always creates a DRAFT release, so nothing becomes public until
# a maintainer reviews the artifacts and presses Publish.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: web/package-lock.json}
      - uses: actions/setup-go@v5
        with: {go-version: '1.26.x', cache: true}
      - shell: pwsh
        run: ./scripts/package.ps1
      - uses: actions/upload-artifact@v4
        with: {name: release-artifacts, path: artifacts/*}

  publish:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: {name: release-artifacts, path: artifacts}
      - name: List artifacts
        run: ls -la artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
