<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StudioForge</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: #090d12;
      }

      body {
        position: relative;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        color: #e8edf4;
      }

      .glow {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.55;
        pointer-events: none;
      }

      .glow-1 {
        width: 620px;
        height: 620px;
        left: -180px;
        top: -220px;
        background: radial-gradient(circle at 30% 30%, #76a9ff, transparent 70%);
      }

      .glow-2 {
        width: 560px;
        height: 560px;
        right: -160px;
        bottom: -240px;
        background: radial-gradient(circle at 70% 70%, #9f7aea, transparent 70%);
        opacity: 0.4;
      }

      .frame {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 96px;
      }

      .mark {
        width: 108px;
        height: 108px;
        border-radius: 26px;
        background: linear-gradient(135deg, #76a9ff, #9f7aea);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 40px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
      }

      .mark span {
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #08111f;
      }

      h1 {
        font-size: 96px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
        color: #f4f7fb;
      }

      p.subtitle {
        margin-top: 26px;
        font-size: 34px;
        font-weight: 500;
        color: #b7c1d1;
        max-width: 900px;
        line-height: 1.3;
      }

      .badge {
        margin-top: 44px;
        display: inline-flex;
        align-items: center;
        gap: 14px;
        width: fit-content;
        padding: 14px 26px;
        border-radius: 999px;
        background: #0f151d;
        border: 1px solid #253142;
        font-size: 22px;
        font-weight: 600;
        color: #8d9aad;
        letter-spacing: 0.01em;
      }

      .badge .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #42d392;
        box-shadow: 0 0 0 4px rgba(66, 211, 146, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="frame">
      <div class="mark"><span>SF</span></div>
      <h1>StudioForge</h1>
      <p class="subtitle">Build and test Roblox projects with AI agents</p>
      <div class="badge"><span class="dot"></span>Local, open source, public beta</div>
    </div>
  </body>
</html>
